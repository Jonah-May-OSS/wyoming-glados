---
name: Release
permissions:
  contents: write
on:
  push:
    branches:
      - release/*

jobs:
  release:
    name: Release
    if: startsWith(github.ref, 'refs/heads/release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Extract version from branch name
        id: extract_version
        run: |
          VERSION=${GITHUB_REF#refs/heads/release/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Zip Release
        run: zip -x '*.git*' -r release.zip .

      - name: Install GitReleaseManager
        uses: gittools/actions/gitreleasemanager/setup@40f115e87851d46e8924ae3aa57f006b0e84268c
        with:
          versionSpec: '0.20.0'

      - name: Create release with GitReleaseManager
        uses: gittools/actions/gitreleasemanager/create@40f115e87851d46e8924ae3aa57f006b0e84268c
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          milestone: ${{ steps.extract_version.outputs.version }}
          name: ${{ steps.extract_version.outputs.version }}
          assets: |
            release.zip

      - name: Publish release with GitReleaseManager
        uses: gittools/actions/gitreleasemanager/publish@40f115e87851d46e8924ae3aa57f006b0e84268c
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          milestone: ${{ steps.extract_version.outputs.version }}

      - name: Close release with GitReleaseManager
        uses: gittools/actions/gitreleasemanager/close@40f115e87851d46e8924ae3aa57f006b0e84268c
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          milestone: ${{ steps.extract_version.outputs.version }}
