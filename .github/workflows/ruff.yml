name: Ruff
permissions:
  contents: read
  pull-requests: write

on: [pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Ruff Check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.10"
          src: "."
          args: "check --output-format=github"
      - name: Ruff Format Check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.10"
          src: "."
          args: "format --check"
