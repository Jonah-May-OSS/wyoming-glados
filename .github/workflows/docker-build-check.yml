name: Docker Build Check

# The publish workflow only builds on release, so image changes otherwise ship
# unvalidated. This builds the dGPU image (amd64, no push) and runs GPU-free
# smoke tests — venv relocation (imports), models baked in the expected dir,
# and TLS trust — whenever the Dockerfile / entrypoint change. Also dispatchable.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "docker/Dockerfile"
      - "docker/run.sh"
      - ".github/workflows/docker-build-check.yml"
  workflow_dispatch: {}

concurrency:
  group: docker-build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: Build dGPU image (amd64) + smoke tests
    runs-on: self-hosted
    steps:
      - name: Check out the repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3

      - name: Build dGPU image (amd64, load locally, no push)
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: wyoming-glados:build-check
          platforms: linux/amd64

      - name: Import smoke test (venv relocated onto the slim runtime, no GPU)
        # torch + tensorrt import cleanly without a GPU and prove the venv
        # relocated. torch_tensorrt is NOT imported here: it eagerly probes for
        # an NVIDIA driver at import time (Tegra detection) and raises on the
        # GPU-less CI runner, so we only assert it is present/relocated via
        # find_spec. Its real functionality is covered by the GPU server-start
        # validation done before release.
        run: |
          docker run --rm \
            --entrypoint /usr/src/wyoming-glados/venv/bin/python \
            -w /usr/src/wyoming-glados \
            wyoming-glados:build-check \
            -c "import torch, tensorrt, importlib.util; \
                assert importlib.util.find_spec('torch_tensorrt'), 'torch_tensorrt missing'; \
                print('torch', torch.__version__); \
                print('tensorrt', tensorrt.__version__); \
                print('torch_tensorrt present (GPU-only import path skipped)')"

      - name: Models baked into the runtime image (matches run.sh MODEL_DIR)
        run: |
          docker run --rm --entrypoint sh wyoming-glados:build-check -c '
            d=/usr/src/wyoming-glados/gladostts/models
            echo "listing $d:"; ls -la "$d"
            [ -n "$(ls -A "$d" 2>/dev/null)" ] || { echo "MODELS MISSING in $d"; exit 1; }
            echo "models present OK"'

      - name: TLS trust smoke test (catches a missing CA bundle, no GPU needed)
        run: |
          docker run --rm \
            --entrypoint /usr/src/wyoming-glados/venv/bin/python \
            wyoming-glados:build-check \
            -c "import urllib.request, urllib.error
          try:
              urllib.request.urlopen('https://github.com', timeout=20)
          except urllib.error.HTTPError:
              pass  # any HTTP status means the TLS handshake + CA verify worked
          print('TLS trust OK')"

      - name: Report image size
        run: |
          docker images wyoming-glados:build-check --format '{{.Size}}'
