# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Publish Docker Images
permissions:
  contents: read
  pull-requests: write

on:
  release:
    types: [published]

jobs:
   build_and_push_images:
    name: Build and Push Docker Images
    runs-on: self-hosted
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # GPU driver (nvidia runtime) and Docker (dind sidecar) come from the
      # self-hosted ARC runner; building the image doesn't need host CUDA/nvcc.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@f4e8deed0c3c26542279f4042c0e1d059cbf012d
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3

      - name: Log in to Docker Hub
        uses: docker/login-action@ba754150c9dbbaa912ae0ac3cfba43f84195cef2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c3b064c6d7c32446d6bc214ea075f1caad2de35a
        with:
          images: captnspdr/wyoming-glados

      - name: Build and Push dGPU Image (multi-arch)
        id: push-dgpu
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata (tags, labels) for iGPU
        id: meta-igpu
        uses: docker/metadata-action@c3b064c6d7c32446d6bc214ea075f1caad2de35a
        with:
          images: captnspdr/wyoming-glados
          flavor: |
            suffix=-igpu,onlatest=true

      - name: Build and Push iGPU (Jetson) Image
        id: push-igpu
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: ./docker
          file: ./docker/Dockerfile.igpu
          push: true
          tags: ${{ steps.meta-igpu.outputs.tags }}
          labels: ${{ steps.meta-igpu.outputs.labels }}
          platforms: linux/arm64
