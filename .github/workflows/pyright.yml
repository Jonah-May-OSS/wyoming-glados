name: Pyright
permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          submodules: recursive

      - name: Ruff Check (Auto-fix)
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.10"
          src: "."
          args: "check --fix"

      - name: Ruff Format (Auto-fix)
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.10"
          src: "."
          args: "format"

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit auto-fixes
        if: steps.changes.outputs.changed == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply auto-fixes for pyright workflow"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pyright
        run: pyright
