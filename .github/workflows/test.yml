name: Test GLaDOS TTS Server
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '.vscode/**'
      - 'docker/**'
      - 'GitReleaseManager.yaml'
      - '**/*.md'
      - 'renovate.json'

jobs:
  # Add a dependency job that waits for required checks
  wait_for_checks:
    name: "Wait for required checks"
    runs-on: ubuntu-latest
    steps:
      # wait-on-check-action-ts self-fails if a check's conclusion is not in
      # allowed-conclusions (default success,skipped), so no separate "fail if"
      # gate step is needed.
      - name: Wait for Ruff check
        uses: matiasalbarello/wait-on-check-action-ts@8087812521cdb59ebc7751984b31b17209b30eeb # v1.2.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-name: ruff
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for Pylint check
        uses: matiasalbarello/wait-on-check-action-ts@8087812521cdb59ebc7751984b31b17209b30eeb # v1.2.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-name: pylint
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for Pyright check
        uses: matiasalbarello/wait-on-check-action-ts@8087812521cdb59ebc7751984b31b17209b30eeb # v1.2.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-name: pyright
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  test_linux:
    needs: wait_for_checks
    name: "Build and Test on Linux (self-hosted runner)"
    runs-on: self-hosted
    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          submodules: recursive

      # gcc/g++, netcat-openbsd and virtualenv are baked into the custom runner
      # image (local/gpu-runner), so no in-job apt/pip installs are needed.

      # RUNNER_TOOL_CACHE points at the persistent NFS cache, so 3.13 is
      # downloaded once and restored instantly after.
      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      # No CUDA toolkit install: every dependency is a prebuilt wheel (torch,
      # torch-tensorrt, torchvision, scipy, ...) with no source compilation, so
      # nvcc isn't needed. CUDA runtime comes from the wheels + the self-hosted
      # runner's nvidia runtime. Installing the toolkit per run wrote ~4GB to
      # local disk and contributed to a cluster etcd incident.

      # The server defaults --models-dir to $MODELS_DIR (falling back to the
      # container path /usr/src/models, which isn't writable on a self-hosted
      # runner). Point it at the persistent NFS cache when available so the
      # model download is reused across runs; otherwise a writable local dir.
      - name: Configure models dir
        run: |
          if [ -n "$RUNNER_CACHE" ]; then
            MODELS_DIR="$RUNNER_CACHE/glados/models"
          else
            MODELS_DIR="$PWD/gladostts/models"
          fi
          mkdir -p "$MODELS_DIR"
          echo "MODELS_DIR=$MODELS_DIR" >> "$GITHUB_ENV"
          echo "Using MODELS_DIR=$MODELS_DIR"

      - name: Setup Virtual Environment
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 download.py --model-dir "$MODELS_DIR"
          pip install -r requirements.txt

      - name: Start GLaDOS TTS Server and Test Listening
        run: |
          source .venv/bin/activate
          # __main__.py reads MODELS_DIR from the environment for --models-dir.
          nohup python3 __main__.py --uri 'tcp://0.0.0.0:10201' --debug --streaming > server.log 2>&1 &
          SERVER_PID=$!
          echo "Started GLaDOS TTS server with PID $SERVER_PID"

          function is_server_listening() {
            nc -z localhost 10201
          }

          TIMEOUT=600
          INTERVAL=10
          ELAPSED=0

          while ! is_server_listening; do
            # Fail fast if the server process died (e.g. a native segfault)
            # instead of waiting out the full timeout.
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              STATUS=0
              wait "$SERVER_PID" || STATUS=$?
              echo "Server process exited prematurely (status $STATUS) before listening."
              echo "----- server.log -----"
              cat server.log || true
              exit 1
            fi
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Server failed to start within $TIMEOUT seconds."
              kill "$SERVER_PID" 2>/dev/null || true
              exit 1
            fi
            echo "Waiting for server to start... ($ELAPSED/$TIMEOUT seconds elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Server is successfully listening on port 10201."
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true
          exit 0

      - name: Upload Server Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs
          path: server.log
